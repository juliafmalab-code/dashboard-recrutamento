<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda da Semana — Allu People</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:     #1a5c38;
    --green-mid: #2d7a50;
    --green-bg:  #eaf2ed;
    --text:      #0f1c14;
    --text-2:    #4a6358;
    --text-3:    #9eabbe;
    --border:    #e4e9ec;
    --bg:        #f0f3f5;
    --card:      #ffffff;
  }

  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 56px; display: flex; align-items: center; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo:hover .logo-back { opacity: 1; transform: translateX(0); }
  .logo-back { font-size: 0.75rem; color: var(--green); opacity: 0; transform: translateX(4px); transition: opacity 0.2s, transform 0.2s; font-weight: 600; }
  .logo-mark { width: 30px; height: 30px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.85rem; letter-spacing: -0.5px; flex-shrink: 0; transition: background 0.2s; }
  .logo:hover .logo-mark { background: var(--green-mid); }
  .logo-name { font-size: 0.875rem; font-weight: 600; color: var(--text); }
  .header-title { font-size: 0.8rem; color: var(--text-3); font-weight: 500; margin-left: 4px; }

  main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* Page header + week navigation */
  .page-header { margin-bottom: 28px; }
  .week-nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .week-btn {
    width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer; color: var(--text-2); font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .week-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .week-btn:disabled { opacity: 0.3; cursor: default; }
  .page-header h1 { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 4px; }
  .page-header p  { font-size: 0.85rem; color: var(--text-2); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.6rem; font-weight: 800; letter-spacing: 0.9px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 20px; background: var(--green-bg); color: var(--green);
  }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* Totals */
  .totals-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .total-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .total-icon { width: 38px; height: 38px; background: var(--green-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .total-label { font-size: 0.7rem; color: var(--text-2); font-weight: 500; margin-bottom: 2px; }
  .total-value { font-size: 1.25rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }

  /* Vaga cards */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .vaga-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .vaga-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
  .vaga-title { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: -0.2px; margin-top: 6px; }
  .etapas { padding: 14px 0 4px; }
  .etapa { padding: 12px 20px 14px; border-bottom: 1px solid var(--border); }
  .etapa:last-child { border-bottom: none; }
  .etapa-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .etapa-label-wrap { display: flex; align-items: center; gap: 8px; }
  .etapa-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-hr   { background: #6b7fa3; }
  .dot-role { background: #2d7a50; }
  .dot-cult { background: var(--green); }
  .etapa-nome { font-size: 0.8rem; font-weight: 700; color: var(--text); }
  .etapa-desc { font-size: 0.68rem; color: var(--text-3); font-weight: 400; margin-top: 1px; }
  .etapa-count { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  .count-hr   { color: #6b7fa3; }
  .count-role { color: #2d7a50; }
  .count-cult { color: var(--green); }
  .count-zero { color: var(--text-3); font-size: 1rem; }
  .etapa-bar-wrap { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
  .etapa-bar { height: 100%; border-radius: 4px; }
  .bar-hr   { background: #b0bfde; }
  .bar-role { background: #4aab78; }
  .bar-cult { background: var(--green); }

  /* Candidate list */
  .candidatos { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .candidatos li {
    font-size: 0.7rem; color: var(--text-2); font-weight: 500;
    padding: 4px 8px; border-radius: 6px; background: var(--bg);
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .candidatos li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; transition: background 0.15s; }
  .cand-nome { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cand-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .dia { font-size: 0.6rem; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .cand-actions { display: flex; gap: 3px; }
  .btn-approve, .btn-reject, .btn-reschedule {
    width: 18px; height: 18px; border: none; border-radius: 4px;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-approve { background: #d4edda; color: #2e7d32; }
  .btn-reject  { background: #f8d7da; color: #c62828; }
  .btn-approve:hover { background: #b8dfc4; transform: scale(1.1); }
  .btn-reject:hover  { background: #f4bec3; transform: scale(1.1); }
  .btn-approve.active    { background: #28a745; color: white; }
  .btn-reject.active     { background: #dc3545; color: white; }
  .btn-reschedule        { background: #dbeafe; color: #1e40af; }
  .btn-reschedule:hover  { background: #bfdbfe; transform: scale(1.1); }
  .btn-reschedule.active { background: #2563eb; color: white; }

  /* Approved / rejected / rescheduled row state */
  .candidatos li.aprovado    { background: #d4edda; }
  .candidatos li.reprovado   { background: #fdecea; }
  .candidatos li.reagendado  { background: #dbeafe; }
  .candidatos li.aprovado::before   { background: #28a745; }
  .candidatos li.reprovado::before  { background: #dc3545; }
  .candidatos li.reagendado::before { background: #2563eb; }

  .vazia { font-size: 0.72rem; color: var(--text-3); font-style: italic; padding: 4px 0; }

  /* Approval / rejection stats strip */
  .etapa-stats { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .stat-pill { flex: 1; display: flex; align-items: center; gap: 5px; padding: 5px 9px; border-radius: 7px; }
  .stat-pill.aprov  { background: #eaf7ee; }
  .stat-pill.reprov { background: #fdecea; }
  .stat-pill .stat-icon { font-size: 0.7rem; font-weight: 900; }
  .stat-pill.aprov  .stat-icon { color: #1b6b2e; }
  .stat-pill.reprov .stat-icon { color: #c62828; }
  .stat-pill .stat-n { font-size: 0.82rem; font-weight: 800; letter-spacing: -0.3px; }
  .stat-pill.aprov  .stat-n { color: #1b6b2e; }
  .stat-pill.reprov .stat-n { color: #c62828; }
  .stat-pill .stat-lbl { font-size: 0.6rem; font-weight: 500; color: var(--text-2); }
  .stat-pill .stat-pct { font-size: 0.62rem; font-weight: 700; margin-left: auto; }
  .stat-pill.aprov  .stat-pct { color: #2e7d32; }
  .stat-pill.reprov .stat-pct { color: #b71c1c; }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .totals-row { grid-template-columns: repeat(2, 1fr); }
    main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html" title="Voltar à página inicial">
    <span class="logo-back">←</span>
    <div class="logo-mark">rh</div>
    <span class="logo-name">allu people</span>
  </a>
  <span class="header-title">/ Agenda da Semana</span>

<main id="app"></main>

<script>

// ── AGENDA DATA START ──

            }
          ],

            },

            }
          ],
          "cultura": []
        }
      }
    }
  }
};
// ── AGENDA DATA END ──

// ── CONSTANTS ──
const MONTH_NAMES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

const STAGE_COLORS = {
  hrInterview: { dot: 'dot-hr',   count: 'count-hr',   bar: 'bar-hr'   },
  roleplay:    { dot: 'dot-role', count: 'count-role', bar: 'bar-role' },
  cultura:     { dot: 'dot-cult', count: 'count-cult', bar: 'bar-cult' }
};
const STAGE_LABELS = {
  hrInterview: { nome: 'HR Interview', desc: 'Entrevista com o RH' },
  roleplay:    { nome: 'Roleplay',     desc: 'Roleplay com os gestores' },
  cultura:     { nome: 'Cultura',      desc: 'Fit cultural com os sócios da allu' }
};

// ── WEEK GENERATION ──
function generateWeeks(from, count) {
  const weeks = [];
  const d = new Date(from + 'T12:00:00');
  for (let i = 0; i < count; i++) {
    weeks.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 7);
  }
  return weeks;
}

function weekLabel(mondayStr) {
  if (AGENDA.weeks[mondayStr]) return AGENDA.weeks[mondayStr].weekLabel;
  const mon = new Date(mondayStr + 'T12:00:00');
  const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  const d1 = mon.getDate(), m1 = mon.getMonth();
  const d2 = fri.getDate(), m2 = fri.getMonth(), y = fri.getFullYear();
  return m1 === m2
    ? `${d1} a ${d2} de ${MONTH_NAMES[m1]} de ${y}`
    : `${d1} de ${MONTH_NAMES[m1]} a ${d2} de ${MONTH_NAMES[m2]} de ${y}`;
}

const ALL_WEEKS = generateWeeks('2026-05-04', 28);

// Default to the last week that has data
const weeksWithData = ALL_WEEKS.filter(w => AGENDA.weeks[w]);
let weekIdx = weeksWithData.length
  ? ALL_WEEKS.indexOf(weeksWithData[weeksWithData.length - 1])
  : 1;

// ── APPROVAL STATUS (localStorage) ──
function lsKey(weekKey, vaga, stage, nome) {
  return `allu|${weekKey}|${vaga}|${stage}|${nome}`;
}
function getStatus(weekKey, vaga, stage, nome) {
  return localStorage.getItem(lsKey(weekKey, vaga, stage, nome)) || '';
}

// Global registry reset each render — avoids string-escaping issues in onclick
let _reg = [];
window._toggle = function(idx, val) {
  const {weekKey, vaga, stage, nome} = _reg[idx];
  const k = lsKey(weekKey, vaga, stage, nome);
  if (localStorage.getItem(k) === val) localStorage.removeItem(k);
  else localStorage.setItem(k, val);
  render();
};

// ── RENDERING ──
function pct(n, max) { return max === 0 ? 0 : Math.round(n / max * 100); }

function renderCandidate(cd, weekKey, vaga, stage) {
  const status = getStatus(weekKey, vaga, stage, cd.nome);
  const idx = _reg.length;
  _reg.push({ weekKey, vaga, stage, nome: cd.nome });
  return `<li class="${status}">
    <span class="cand-nome">${cd.nome}</span>
    <div class="cand-right">
      <span class="dia">${cd.dia}</span>
      <div class="cand-actions">
        <button class="btn-approve${status === 'aprovado' ? ' active' : ''}" onclick="_toggle(${idx},'aprovado')" title="Aprovado"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
        <button class="btn-reject${status === 'reprovado' ? ' active' : ''}" onclick="_toggle(${idx},'reprovado')" title="Reprovado"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        <button class="btn-reschedule${status === 'reagendado' ? ' active' : ''}" onclick="_toggle(${idx},'reagendado')" title="Reagendar"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg></button>
      </div>
    </div>
  </li>`;
}

function renderEtapa(stage, candidates, barWidth, weekKey, vaga) {
  const c = STAGE_COLORS[stage], l = STAGE_LABELS[stage], n = candidates.length;
  const nAprov  = candidates.filter(cd => getStatus(weekKey, vaga, stage, cd.nome) === 'aprovado').length;
  const nReprov = candidates.filter(cd => getStatus(weekKey, vaga, stage, cd.nome) === 'reprovado').length;
  const pctAprov  = n > 0 ? Math.round(nAprov  / n * 100) : 0;
  const pctReprov = n > 0 ? Math.round(nReprov / n * 100) : 0;
  return `<div class="etapa">
    <div class="etapa-top">
      <div class="etapa-label-wrap">
        <div class="etapa-dot ${c.dot}"></div>
        <div>
          <div class="etapa-nome">${l.nome}</div>
          <div class="etapa-desc">${l.desc}</div>
        </div>
      </div>
      ${n > 0 ? `<div class="etapa-count ${c.count}">${n}</div>` : `<div class="etapa-count count-zero">—</div>`}
    </div>
    <div class="etapa-bar-wrap"><div class="etapa-bar ${c.bar}" style="width:${barWidth}%"></div></div>
    ${n > 0
      ? `<ul class="candidatos">${candidates.map(cd => renderCandidate(cd, weekKey, vaga, stage)).join('')}</ul>
         <div class="etapa-stats">
           <div class="stat-pill aprov"><span class="stat-icon">✓</span><span class="stat-n">${nAprov}</span><span class="stat-lbl">aprovados</span><span class="stat-pct">${pctAprov}%</span></div>
           <div class="stat-pill reprov"><span class="stat-icon">✗</span><span class="stat-n">${nReprov}</span><span class="stat-lbl">reprovados</span><span class="stat-pct">${pctReprov}%</span></div>
         </div>`
      : `<p class="vazia">Nenhuma entrevista agendada</p>`}
  </div>`;
}

function renderVaga(nome, data, maxes, weekKey) {
  return `<div class="vaga-card">
    <div class="vaga-header">
      <div class="badge"><span class="dot"></span>${nome}</div>
      <div class="vaga-title">${nome}</div>
    </div>
    <div class="etapas">
      ${renderEtapa('hrInterview', data.hrInterview, pct(data.hrInterview.length, maxes.hr), weekKey, nome)}
      ${renderEtapa('roleplay',    data.roleplay,    pct(data.roleplay.length,    maxes.rp), weekKey, nome)}
      ${renderEtapa('cultura',     data.cultura,     pct(data.cultura.length,     maxes.cu), weekKey, nome)}
    </div>
  </div>`;
}

function render() {
  _reg = [];
  const weekKey = ALL_WEEKS[weekIdx];
  const weekData = AGENDA.weeks[weekKey];
  const EMPTY = { hrInterview: [], roleplay: [], cultura: [] };
  const vagas = weekData ? weekData.vagas : { SDR: EMPTY, Closer: EMPTY, Farmer: EMPTY };
  const names = Object.keys(vagas);

  const maxes = {
    hr: Math.max(1, ...names.map(v => vagas[v].hrInterview.length)),
    rp: Math.max(1, ...names.map(v => vagas[v].roleplay.length)),
    cu: Math.max(1, ...names.map(v => vagas[v].cultura.length))
  };
  const totHR = names.reduce((s, v) => s + vagas[v].hrInterview.length, 0);
  const totRP = names.reduce((s, v) => s + vagas[v].roleplay.length, 0);
  const totCU = names.reduce((s, v) => s + vagas[v].cultura.length, 0);
  const total = totHR + totRP + totCU;

  const label = weekLabel(weekKey);
  const isPrev = weekIdx > 0;
  const isNext = weekIdx < ALL_WEEKS.length - 1;

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div class="week-nav-row">
        <button class="week-btn" onclick="prevWeek()" ${isPrev ? '' : 'disabled'} title="Semana anterior">&#8592;</button>
        <div class="badge"><span class="dot"></span>${label}</div>
        <button class="week-btn" onclick="nextWeek()" ${isNext ? '' : 'disabled'} title="Próxima semana">&#8594;</button>
      </div>
      <h1>Entrevistas da Semana</h1>
      <p>HR Interview, Roleplay e Cultura — por vaga: ${names.join(', ')}</p>
    </div>

    <div class="totals-row">
      <div class="total-card"><div class="total-icon">🗓️</div><div><div class="total-label">Total de entrevistas</div><div class="total-value">${total}</div></div></div>
      <div class="total-card"><div class="total-icon">🎙️</div><div><div class="total-label">HR Interview</div><div class="total-value">${totHR}</div></div></div>
      <div class="total-card"><div class="total-icon">🎭</div><div><div class="total-label">Roleplay</div><div class="total-value">${totRP}</div></div></div>
      <div class="total-card"><div class="total-icon">🤝</div><div><div class="total-label">Cultura</div><div class="total-value">${totCU}</div></div></div>
    </div>

    <div class="grid">
      ${names.map(v => renderVaga(v, vagas[v], maxes, weekKey)).join('')}
    </div>`;
}

function prevWeek() { if (weekIdx > 0) { weekIdx--; render(); } }
function nextWeek() { if (weekIdx < ALL_WEEKS.length - 1) { weekIdx++; render(); } }

render();
</script>

</html>
