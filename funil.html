<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda da Semana — Allu People</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:     #1a5c38;
    --green-mid: #2d7a50;
    --green-bg:  #eaf2ed;
    --text:      #0f1c14;
    --text-2:    #4a6358;
    --text-3:    #9eabbe;
    --border:    #e4e9ec;
    --bg:        #f0f3f5;
    --card:      #ffffff;
  }

  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo:hover .logo-back { opacity: 1; transform: translateX(0); }
  .logo-back { font-size: 0.75rem; color: var(--green); opacity: 0; transform: translateX(4px); transition: opacity 0.2s, transform 0.2s; font-weight: 600; }
  .logo-mark { width: 30px; height: 30px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.85rem; letter-spacing: -0.5px; flex-shrink: 0; transition: background 0.2s; }
  .logo:hover .logo-mark { background: var(--green-mid); }
  .logo-name { font-size: 0.875rem; font-weight: 600; color: var(--text); }
  .header-title { font-size: 0.8rem; color: var(--text-3); font-weight: 500; margin-left: 4px; }

  main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 4px; }
  .page-header p { font-size: 0.85rem; color: var(--text-2); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.6rem; font-weight: 800; letter-spacing: 0.9px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 20px; background: var(--green-bg); color: var(--green);
    margin-bottom: 10px;
  }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .totals-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .total-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .total-icon { width: 38px; height: 38px; background: var(--green-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .total-label { font-size: 0.7rem; color: var(--text-2); font-weight: 500; margin-bottom: 2px; }
  .total-value { font-size: 1.25rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

  .vaga-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }

  .vaga-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
  .vaga-title { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: -0.2px; margin-top: 6px; }

  .etapas { padding: 14px 0 4px; }

  .etapa { padding: 12px 20px 14px; border-bottom: 1px solid var(--border); }
  .etapa:last-child { border-bottom: none; }

  .etapa-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

  .etapa-label-wrap { display: flex; align-items: center; gap: 8px; }
  .etapa-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-hr     { background: #6b7fa3; }
  .dot-role   { background: #2d7a50; }
  .dot-cult   { background: var(--green); }

  .etapa-nome { font-size: 0.8rem; font-weight: 700; color: var(--text); }
  .etapa-desc { font-size: 0.68rem; color: var(--text-3); font-weight: 400; margin-top: 1px; }

  .etapa-count { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  .count-hr   { color: #6b7fa3; }
  .count-role { color: #2d7a50; }
  .count-cult { color: var(--green); }
  .count-zero { color: var(--text-3); font-size: 1rem; }

  .etapa-bar-wrap { height: 3px; background: var(--border); border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
  .etapa-bar { height: 100%; border-radius: 4px; }
  .bar-hr   { background: #b0bfde; }
  .bar-role { background: #4aab78; }
  .bar-cult { background: var(--green); }

  .candidatos { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .candidatos li {
    font-size: 0.7rem; color: var(--text-2); font-weight: 500;
    padding: 4px 8px; border-radius: 6px; background: var(--bg);
    display: flex; align-items: center; gap: 6px;
  }
  .candidatos li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
  .candidatos .dia { font-size: 0.6rem; color: var(--text-3); font-weight: 600; margin-left: auto; text-transform: uppercase; letter-spacing: 0.5px; }

  .vazia { font-size: 0.72rem; color: var(--text-3); font-style: italic; padding: 4px 0; }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .totals-row { grid-template-columns: repeat(2, 1fr); }
    main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html" title="Voltar à página inicial">
    <span class="logo-back">←</span>
    <div class="logo-mark">rh</div>
    <span class="logo-name">allu people</span>
  </a>
  <span class="header-title">/ Agenda da Semana</span>
</header>

<main id="app"></main>

<script>

// ── AGENDA DATA START ──
const AGENDA = {
  weekLabel: "11 a 15 de maio de 2026",
  vagas: {
    SDR: {
      hrInterview: [
        { nome: "Mikaella Vila Real", dia: "seg" },
        { nome: "Agata Morais Ribeiro", dia: "seg" },
        { nome: "Miguel Pimenta", dia: "seg" },
        { nome: "Joyce Helen", dia: "seg" }
      ],
      roleplay: [
        { nome: "Victor dos Anjos Costa", dia: "seg" }
      ],
      cultura: []
    },
    Closer: {
      hrInterview: [
        { nome: "Lais Santos", dia: "seg" },
        { nome: "Sarah AKL", dia: "seg" },
        { nome: "Ana Luísa", dia: "seg" }
      ],
      roleplay: [
        { nome: "Fabiano Jose da Silva", dia: "seg" }
      ],
      cultura: []
    },
    Farmer: {
      hrInterview: [
        { nome: "Suelem Souza", dia: "seg" },
        { nome: "Marcos Antonio de Souza", dia: "seg" },
        { nome: "Stephany Leoncio", dia: "seg" },
        { nome: "Fhelipe Octavio", dia: "seg" },
        { nome: "Fernanda Santos Vidigal Nascimento", dia: "seg" }
      ],
      roleplay: [],
      cultura: []
    }
  }
};
// ── AGENDA DATA END ──

const STAGE_COLORS = {
  hrInterview: { dot: 'dot-hr',   count: 'count-hr',   bar: 'bar-hr'   },
  roleplay:    { dot: 'dot-role', count: 'count-role', bar: 'bar-role' },
  cultura:     { dot: 'dot-cult', count: 'count-cult', bar: 'bar-cult' }
};

const STAGE_LABELS = {
  hrInterview: { nome: 'HR Interview', desc: 'Entrevista com o RH' },
  roleplay:    { nome: 'Roleplay',     desc: 'Roleplay com os gestores' },
  cultura:     { nome: 'Cultura',      desc: 'Fit cultural com os sócios da allu' }
};

function pct(count, max) {
  return max === 0 ? 0 : Math.round(count / max * 100);
}

function renderEtapa(stage, candidates, barWidth) {
  const c = STAGE_COLORS[stage];
  const l = STAGE_LABELS[stage];
  const n = candidates.length;
  return `
    <div class="etapa">
      <div class="etapa-top">
        <div class="etapa-label-wrap">
          <div class="etapa-dot ${c.dot}"></div>
          <div>
            <div class="etapa-nome">${l.nome}</div>
            <div class="etapa-desc">${l.desc}</div>
          </div>
        </div>
        ${n > 0
          ? `<div class="etapa-count ${c.count}">${n}</div>`
          : `<div class="etapa-count count-zero">—</div>`}
      </div>
      <div class="etapa-bar-wrap"><div class="etapa-bar ${c.bar}" style="width:${barWidth}%"></div></div>
      ${n > 0
        ? `<ul class="candidatos">${candidates.map(cd => `<li>${cd.nome} <span class="dia">${cd.dia}</span></li>`).join('')}</ul>`
        : `<p class="vazia">Nenhuma entrevista agendada</p>`}
    </div>`;
}

function renderVaga(nome, data, maxes) {
  return `
    <div class="vaga-card">
      <div class="vaga-header">
        <div class="badge"><span class="dot"></span>${nome}</div>
        <div class="vaga-title">${nome}</div>
      </div>
      <div class="etapas">
        ${renderEtapa('hrInterview', data.hrInterview, pct(data.hrInterview.length, maxes.hr))}
        ${renderEtapa('roleplay',    data.roleplay,    pct(data.roleplay.length,    maxes.rp))}
        ${renderEtapa('cultura',     data.cultura,     pct(data.cultura.length,     maxes.cu))}
      </div>
    </div>`;
}

function render() {
  const names = Object.keys(AGENDA.vagas);
  const maxes = {
    hr: Math.max(...names.map(v => AGENDA.vagas[v].hrInterview.length)),
    rp: Math.max(...names.map(v => AGENDA.vagas[v].roleplay.length)),
    cu: Math.max(...names.map(v => AGENDA.vagas[v].cultura.length))
  };
  const totHR = names.reduce((s, v) => s + AGENDA.vagas[v].hrInterview.length, 0);
  const totRP = names.reduce((s, v) => s + AGENDA.vagas[v].roleplay.length, 0);
  const totCU = names.reduce((s, v) => s + AGENDA.vagas[v].cultura.length, 0);
  const total = totHR + totRP + totCU;

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div class="badge"><span class="dot"></span>${AGENDA.weekLabel}</div>
      <h1>Entrevistas da Semana</h1>
      <p>HR Interview, Roleplay e Cultura — por vaga: ${names.join(', ')}</p>
    </div>
    <div class="totals-row">
      <div class="total-card"><div class="total-icon">🗓️</div><div><div class="total-label">Total de entrevistas</div><div class="total-value">${total}</div></div></div>
      <div class="total-card"><div class="total-icon">🎙️</div><div><div class="total-label">HR Interview</div><div class="total-value">${totHR}</div></div></div>
      <div class="total-card"><div class="total-icon">🎭</div><div><div class="total-label">Roleplay</div><div class="total-value">${totRP}</div></div></div>
      <div class="total-card"><div class="total-icon">🤝</div><div><div class="total-label">Cultura</div><div class="total-value">${totCU}</div></div></div>
    </div>
    <div class="grid">
      ${names.map(v => renderVaga(v, AGENDA.vagas[v], maxes)).join('')}
    </div>`;
}

render();
</script>

</body>
</html>
